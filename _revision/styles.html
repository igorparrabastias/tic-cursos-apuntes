<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Muestrario de estilos — OpenAI</title>
<style>
  body{font:15px/1.5 system-ui,sans-serif;background:#f5f6f9;color:#1f2430;margin:0;padding:24px}

</style></head><body>
<h1>Muestrario de estilos — mismo tema, a color (gpt-image-1-mini, $0.016 c/u)</h1>

  <div class="card"><img src="../pages/assets/styles/2-realista.png"><div class="nm">2 · Realista / 3D cine</div></div>
  <div class="card"><img src="../pages/assets/styles/3-scifi-neon.png"><div class="nm">3 · Sci-fi / neón cyberpunk</div></div>
  <div class="card"><img src="../pages/assets/styles/4-vibrante.png"><div class="nm">4 · Vibrante moderna</div></div>
  <div class="card"><img src="../pages/assets/styles/5-isometrico.png"><div class="nm">5 · Isométrico 3D</div></div>
  <div class="card"><img src="../pages/assets/styles/6-acuarela.png"><div class="nm">6 · Acuarela</div></div>
</div>
</body></html>
