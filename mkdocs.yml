site_name: Apuntes TIC — Igor Parra
site_description: Apuntes sobre Tecnologías de la Información y Comunicaciones (PLN, IA, Python, algoritmos).
site_url: https://igorparrabastias.github.io/tic-cursos-apuntes/
docs_dir: pages
# URLs planas (.html) para que las rutas relativas de <img> en HTML resuelvan igual
# en GitHub, local y Pages (assets/ junto a la página, no en un subdirectorio).
use_directory_urls: false

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Modo oscuro }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Modo claro }
  features:
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Inicio: index.md
  - Fundamentos del PLN y la IA (1950–hoy):
    - Introducción y serie: fundamento-del-pln-y-la-ia.md
    - 1 · Orígenes (1950–1979): fundamentos-1-origenes.md
    - 2 · Estadística y redes (1980–2000s): fundamentos-2-estadistica-redes.md
    - 3 · La era de los LLM (2013–2026): fundamentos-3-era-llm.md
    - 4 · Investigación reciente y futuro: fundamentos-4-investigacion-futuro.md
  - Python — apuntes y algoritmos: apuntes-python.md
  - Estructuras de árboles: index-trees.md
  - Temario — Redes y comunicaciones: fundamentos-de-redes-y-comunicaciones-digitales.md
  - Notebooks — opciones para ejecutarlos: demo-notebooks.md
  # La sección "Notebooks (ejecutables)" con los 263 .ipynb la añade nb_hook.py.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      slugify: !!python/name:pymdownx.slugs.gfm
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

hooks:
  - nb_hook.py        # integra los 263 notebooks + botón "Abrir en Colab" (sin tocarlos)

plugins:
  - callouts          # convierte > [!TIP] (estilo GitHub) en cajas Material visibles
  - search:
      lang: es
  - mkdocs-jupyter:    # renderiza .ipynb dentro del sitio (opción 4 de la demo)
      execute: false
      include_source: true

# El índice manual del doc usa anclas estilo GitHub (para imprimir); en web MkDocs ya da
# navegación lateral + TOC, así que ignoramos el desajuste de anclas de duplicados.
validation:
  links:
    anchors: ignore

# Los índices ahora enlazan a los notebooks renderizados en GitHub (sin 404).
# web.md queda fuera: es un esqueleto de curso sin contenido.
exclude_docs: |
  _revision/
  web.md
