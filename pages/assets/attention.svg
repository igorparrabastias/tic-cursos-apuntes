<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" font-family="system-ui, sans-serif" role="img" aria-label="Mecanismo de atención: Q K V, softmax, salida">
  <style>
    .box{fill:#eef0fb;stroke:#3a47b8;stroke-width:2;rx:8}
    .qkv{font-size:15px;font-weight:700;fill:#3a47b8;text-anchor:middle}
    .op{font-size:12px;fill:#333;text-anchor:middle}
    .fl{stroke:#9aa0c8;stroke-width:2;fill:none}
    .cap{font-size:12px;fill:#666}
  </style>
  <rect width="620" height="240" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0c8"/></marker></defs>
  <!-- Q K V boxes -->
  <rect class="box" x="30"  y="40" width="70" height="42" rx="8"/><text class="qkv" x="65"  y="67">Q</text>
  <rect class="box" x="30"  y="100" width="70" height="42" rx="8"/><text class="qkv" x="65"  y="127">K</text>
  <rect class="box" x="30"  y="160" width="70" height="42" rx="8"/><text class="qkv" x="65"  y="187">V</text>
  <!-- Q·Kᵀ -->
  <rect class="box" x="180" y="70" width="110" height="42" rx="8"/><text class="op" x="235" y="96">Q · Kᵀ / √dₖ</text>
  <line class="fl" x1="100" y1="61"  x2="180" y2="86"  marker-end="url(#a)"/>
  <line class="fl" x1="100" y1="121" x2="180" y2="96"  marker-end="url(#a)"/>
  <!-- softmax -->
  <rect class="box" x="340" y="70" width="100" height="42" rx="8"/><text class="op" x="390" y="96">softmax</text>
  <line class="fl" x1="290" y1="91" x2="340" y2="91" marker-end="url(#a)"/>
  <!-- pesos · V -->
  <rect class="box" x="340" y="150" width="100" height="42" rx="8"/><text class="op" x="390" y="176">pesos · V</text>
  <line class="fl" x1="390" y1="112" x2="390" y2="150" marker-end="url(#a)"/>
  <line class="fl" x1="100" y1="181" x2="340" y2="178" marker-end="url(#a)"/>
  <!-- salida -->
  <rect class="box" x="500" y="150" width="100" height="42" rx="8" fill="#3a47b8"/><text class="op" x="550" y="176" fill="#fff" font-weight="700">salida</text>
  <line class="fl" x1="440" y1="171" x2="500" y2="171" marker-end="url(#a)"/>
  <text class="cap" x="30" y="225">Attention(Q,K,V) = softmax( (Q·Kᵀ)/√dₖ ) · V    —  cada palabra "atiende" a las demás</text>
</svg>
